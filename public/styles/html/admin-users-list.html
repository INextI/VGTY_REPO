<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление пользователями</title>
    <style>
        body { font-family: sans-serif; max-width: 900px; margin: 40px auto; }
        h1 { text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f2f2f2; }
        .actions button { margin-right: 5px; padding: 5px 10px; cursor: pointer; }
        .edit-btn { background-color: #ffc107; border: none; }
        .delete-btn { background-color: #dc3545; border: none; color: white; }
        
        /* Стили для модального окна */
        .modal { display: none; position: fixed; z-index: 1; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.4); }
        .modal-content { background-color: #fefefe; margin: 10% auto; padding: 20px; border: 1px solid #888; width: 80%; max-width: 500px; border-radius: 8px; }
        .close-btn { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; }
        .modal-content button { padding: 10px 15px; background-color: #28a745; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Управление пользователями</h1>
    <table>
        <!-- thead остается без изменений -->
        <thead>
            <tr>
                <th>ID</th>
                <th>Имя Фамилия</th>
                <th>Email (логин)</th>
                <th>Роль</th>
                <th>Действия</th>
            </tr>
        </thead>
        <tbody id="usersTableBody">
            <!-- Данные будут загружены сюда с помощью JavaScript -->
        </tbody>
    </table>

    <!-- Модальное окно (ИСПРАВЛЕННАЯ СТРУКТУРА) -->
    <div id="editUserModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Редактировать пользователя</h2>
            <form id="editUserForm">
                <input type="hidden" id="editUserId">
                <div class="form-group">
                    <label for="editFirstName">Имя:</label>
                    <input type="text" id="editFirstName">
                </div>
                <div class="form-group">
                    <label for="editLastName">Фамилия:</label>
                    <input type="text" id="editLastName">
                </div>
                <div class="form-group">
                    <label for="editEmail">Email (логин):</label>
                    <input type="email" id="editEmail" required>
                </div>
                <div class="form-group">
                    <label for="editPassword">Новый пароль (оставьте пустым, если не меняете):</label>
                    <input type="password" id="editPassword">
                </div>
                <div class="form-group">
                    <label for="editRole">Роль:</label>
                    <select id="editRole">
                        <option value="admin">admin</option>
                        <option value="user">teacher</option>
                        <option value="admin">student</option>
                    </select>
                </div>
                <button type="submit">Сохранить изменения</button>
            </form>
        </div>
    </div>

    <script>
        // Получаем ссылки на элементы DOM
        const tableBody = document.getElementById('usersTableBody');
        // ... остальной код для модального окна ...

        let allUsersData = [];

        // Функция для загрузки пользователей с сервера
        const fetchUsers = async () => {
   try {
        const token = localStorage.getItem('token');
        if (!token) {
            // Можно перенаправить на страницу входа
            window.location.href = '/login.html'; // 
            return;
        }

        
        // Правильный URL, который соответствует вашему серверу
        const response = await fetch('/api/users', {
            method: 'GET',
            headers: {
                'Authorization': `Bearer ${token}`
            }
        });

        if (response.status === 403) {
             throw new Error(`Ошибка: 403. У вас недостаточно прав для просмотра этого раздела.`);
        }
        if (!response.ok) {
            throw new Error(`Ошибка сети: ${response.status}`);
        }

        const users = await response.json();
        allUsersData = users;
        renderTable(users);

    } catch (error) {
        console.error('Ошибка при загрузке пользователей:', error);
        tableBody.innerHTML = `<tr><td colspan="5" style="color: red;">${error.message}</td></tr>`;
    }
};

        // Функция для отображения пользователей в таблице
        const renderTable = (users) => {
            tableBody.innerHTML = '';
            if (!users || users.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="5">Пользователи не найдены.</td></tr>';
                return;
            }

            users.forEach(user => {
                const row = document.createElement('tr');
                // Объединяем first_name и last_name в одну ячейку
                // Используем правильные имена полей из БД (first_name, last_name, login)
                row.innerHTML = `
                    <td>${user.id}</td>
                    <td>${user.first_name || ''} ${user.last_name || ''}</td>
                    <td>${user.login}</td>
                    <td>${user.role}</td>
                    <td class="actions">
                        <button class="edit-btn" data-id="${user.id}">Редактировать</button>
                        <button class="delete-btn" data-id="${user.id}">Удалить</button>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        };
        
        // -
        // Открытие и заполнение модального окна
        const openEditModal = (userId) => {
            const user = allUsersData.find(u => u.id === userId);
            if (!user) return;

            document.getElementById('editUserId').value = user.id;
            // Используем правильные имена полей
            document.getElementById('editFirstName').value = user.first_name;
            document.getElementById('editLastName').value = user.last_name;
            document.getElementById('editEmail').value = user.login; // email - 
            document.getElementById('editRole').value = user.role;
            document.getElementById('editPassword').value = ''; 

            modal.style.display = 'block';
        };
            // Вызываем функцию загрузки пользователей при старте
document.addEventListener('DOMContentLoaded', fetchUsers);

// --- Код для управления модальным окном ---
const modal = document.getElementById('editUserModal');
const closeBtn = document.querySelector('.close-btn');

// Открытие модального окна по клику на "Редактировать"
tableBody.addEventListener('click', (event) => {
    if (event.target.classList.contains('edit-btn')) {
        const userId = parseInt(event.target.dataset.id, 10);
        openEditModal(userId);
    }
});

// Закрытие модального окна
closeBtn.onclick = () => { modal.style.display = 'none'; };
window.onclick = (event) => {
    if (event.target == modal) {
        modal.style.display = 'none';
    }
};

// Обработка отправки формы (пока только выводит алерт)
document.getElementById('editUserForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    // Здесь будет логика отправки данных на сервер (PUT/PATCH запрос)
    alert('Логика сохранения еще не реализована.');
    modal.style.display = 'none';
});

        
    </script>
</body> 
</html>
