<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ВГТУ — Вход</title>
    <link rel="stylesheet" href="styles.css">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');

body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: "Montserrat", Arial, sans-serif;
}

.background {
    background: linear-gradient(to right, #ff77005f, #ffffff3e), url('https://cchgeu.ru/upload/resize_cache/iblock/19c/5nzxpiukzw6wx11r2fira17rti9prvev/1200_1200_1/Fv2ykckoWd4.jpg') center center/cover no-repeat;
    position: fixed;
    width: 100vw;
    height: 100vh;
    z-index: -1;
}

.login-container {
    display: flex;
    height: 80vh;
    align-items: center;
    justify-content: center;
}

.login-box {
    background: #fff;
    border-radius: 22px;
    box-shadow: 0 4px 32px rgba(0,0,0,0.18);
    padding: 38px 44px 32px 44px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 340px;
}

.logo {
    width: 64px;
    margin-bottom: 10px;
}

.logo-title {
    font-weight: 700;
    margin-top: 0;
    margin-bottom: 34px;
    color: #15517E;
    letter-spacing: 2px;
}

.input-group {
    display: flex;
    align-items: center;
    margin-bottom: 21px;
    border-bottom: 1px solid #e5e5e5;
}

.input-group input {
    border: none;
    outline: none;
    padding: 17px 8px 17px 3px;
    font-size: 16px;
    flex: 1;
    background: none;
}

.input-icon {
    font-size: 18px;
    color: #a5a5a5;
    padding-right: 7px;
    cursor: pointer;
}

button[type="submit"] {
    background: #FC6A4D;
    color: #fff;
    font-weight: 700;
    border: none;
    border-radius: 22px;
    font-size: 18px;
    padding: 11px 0;
    width: 100%;
    cursor: pointer;
    margin-top: 10px;
    transition: background 0.2s;
}
button[type="submit"]:hover {
    background: #e45c3d;
}

footer {
    width: 100%;
    position: fixed;
    bottom: 0;
    left: 0;
    background: #232A3F;
    color: #ffd374;
    padding: 18px 0;
    z-index: 2;
}

.footer-content {
    display: flex;
    justify-content: center;
    align-items: center;
    max-width: 1200px;
    margin: 0 auto;
}

.footer-logo {
    width: 42px;
    margin-right: 18px;
}

.footer-text {
    font-size: 15px;
    line-height: 20px;
    font-weight: 700;
    letter-spacing: 0.6px;
    margin-right: 60px;
    color: #ffd374;
}

.footer-icons span {
    background: #39405b;
    padding: 7px 12px;
    border-radius: 6px;
    margin-left: 9px;
    font-size: 19px;
    display: inline-block;
    color: #ffd374;
}
</style>


</head>
<body>
    <div class="background"></div>
    <div class="login-container">
        <div class="login-box">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/dd/Vstu_logo.svg/640px-Vstu_logo.svg.png" alt="ВГТУ" class="logo">
            
            <form>
                <div class="input-group">
                    <input type="text" placeholder="Логин" required>
                    <span class="input-icon">👤</span>
                </div>
                <div class="input-group">
                    <input type="password" placeholder="Пароль" required>
                    <span class="input-icon">👁️</span>
                </div>
                <button type="submit">Вход</button>
            </form>
        </div>
    </div>
    <footer>
        <div class="footer-content">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/dd/Vstu_logo.svg/640px-Vstu_logo.svg.png" class="footer-logo">
            <div class="footer-text">
                ВОРОНЕЖСКИЙ ГОСУДАРСТВЕННЫЙ<br>ТЕХНИЧЕСКИЙ УНИВЕРСИТЕТ
            </div>
            <div class="footer-icons">
                <span>🅡</span>
                <span>🕊️</span>
                <span>🧑‍🤝‍🧑</span>
                <span>📘</span>
                <span>🌐</span>
            </div>
        </div>
    </footer>
</body>
</html>
