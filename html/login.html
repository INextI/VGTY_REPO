<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ВГТУ — Вход</title>
    <link rel="stylesheet" href="../styles/login.css">
</head>
<body>
    <div class="background"></div>
    <div class="login-container">
        <div class="login-box">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/dd/Vstu_logo.svg/640px-Vstu_logo.svg.png" alt="ВГТУ" class="logo">
            
            <form>
                <div class="input-group">
                    <input type="text" placeholder="Логин" required>
                    <span class="input-icon">👤</span>
                </div>
                <div class="input-group">
                    <input type="password" placeholder="Пароль" required>
                    <span class="input-icon">👁️</span>
                </div>
                <button type="submit"><a href="home_student.html">Вход</a></button>
            </form>
        </div>
    </div>
    <footer>
        <div class="footer-content">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/dd/Vstu_logo.svg/640px-Vstu_logo.svg.png" class="footer-logo">
            <div class="footer-text">
                ВОРОНЕЖСКИЙ ГОСУДАРСТВЕННЫЙ<br>ТЕХНИЧЕСКИЙ УНИВЕРСИТЕТ
            </div>
            <div class="footer-icons">
                <span>🅡</span>
                <span>🕊️</span>
                <span>🧑‍🤝‍🧑</span>
                <span>📘</span>
                <span>🌐</span>
            </div>
        </div>
    </footer>
</body>
</html>
