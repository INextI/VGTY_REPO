<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Создать курс</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #fcfcfc;
      min-height: 100vh;
      color: #20242E;
    }
    /* Хедер */
    header {
      background: #222d3a;
      padding: 12px 0;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    .header-left {
      display: flex;
      align-items: center;
      margin-left: 30px;
    }
    .logo {
            width: 44px;
            height: 44px;
            background: #fff;
            border-radius: 50%;
            margin-right: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-right: 50px;
    }
    .icon {
      background: none;
      border: none;
      cursor: pointer;
      margin: 0 7px;
      font-size: 20px;
      color: #fff;
    }
    .user-info {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .user-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #e0e3e7;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Основной контент */
    .container {
      margin-top: 70px;
      padding: 0 24px;
      max-width: 1200px;
      margin-left: auto;
      margin-right: auto;
      min-height: 100vh;
    }

    .main-section {
      display: flex;
      margin-top: 30px;
      align-items: flex-start;
      gap: 32px;
    }
    .image-upload {
      width: 170px;
      height: 200px;
      background: #fff;
      border: 1.5px solid #e2e2e2;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #b0b0b0;
      font-size: 16px;
      cursor: pointer;
      text-align: center;
      transition: border 0.2s;
    }
    .image-upload:hover {
      border-color: #f5c66e;
      color: #222C3A;
    }

    .course-title-section {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .course-title-input {
      border: none;
      outline: none;
      border-bottom: 1px solid #dfdfdf;
      padding: 10px 0;
      font-size: 26px;
      color: #222C3A;
      background: transparent;
      margin-bottom: 24px;
      width: 80%;
    }
    .enroll-btn {
      background: #222C3A;
      color: #fff;
      padding: 10px 32px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      margin-top: 10px;
      align-self: flex-start;
      font-size: 14px;
      transition: background 0.2s;
    }
    .enroll-btn:hover {
      background: #f5c66e;
      color: #222C3A;
    }

    .dashboard {
      background: #fff;
      border: 1.5px solid #e2e2e2;
      border-radius: 10px;
      margin-top: 35px;
      padding: 22px 28px 28px 28px;
      width: 100%;
      max-width: 820px;
    }
    .dashboard-label {
      font-size: 17px;
      margin-bottom: 4px;
      color: #828282;
    }
    .dashboard-desc-input {
      width: 100%;
      border: none;
      outline: none;
      border-radius: 15px;
      background: #faf9f9;
      padding: 18px;
      font-size: 16px;
      min-height: 64px;
      margin-top: 4px;
      margin-bottom: 3px;
      resize: vertical;
    }
    .dashboard:active,
    .dashboard:focus-within {
      border-color: #f5c66e;
      cursor: pointer;
      box-shadow: 0 0 2px #f5c66e70;
    }

    .button-row {
      margin-top: 23px;
      display: flex;
      justify-content: center;
      gap: 18px;
      width: 100%;
    }
    .main-btn {
      min-width: 135px;
      padding: 8px 0;
      border-radius: 15px;
      font-size: 15px;
      cursor: pointer;
      border: none;
      transition: background 0.18s, color 0.18s;
    }
    .btn-cancel {
      background: #8b1521;
      color: #fff;
    }
    .btn-cancel:hover {
      background: #c1272d;
    }
    .btn-create {
      background: #222C3A;
      color: #fff;
    }
    .btn-create:hover {
      background: #f5c66e;
      color: #222C3A;
    }
    @media (max-width: 900px) {
      .main-section {
        flex-direction: column;
        align-items: stretch;
      }
      .image-upload {
        margin-bottom: 18px;
      }
      .container {
        padding: 0 8px;
      }
      .dashboard {
        padding: 14px 10px 20px 10px;
      }
    }
  </style>
</head>
<body>
    <header>
        <div class="header-left">
            <div class="logo">
                <!-- Логотип или иконка -->
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/dd/Vstu_logo.svg/640px-Vstu_logo.svg.png" alt="logo" width="24" height="34">
            </div>
          </div>
          <div class="header-right">
            <button class="icon" title="Поиск"><i class="fas fa-search"></i></button>
            <button class="icon" title="Уведомления"><i class="fas fa-bell"></i></button>
            <button class="icon" title="Чат"><i class="fas fa-comments"></i></button>
            <div class="user-info">
              <span>Иван Иванов</span>
              <div class="user-avatar"><i class="fas fa-user"></i></div>
            </div>
          </div>
      </header>

  <div class="container">
    <div class="main-section">
      <div class="image-upload" tabindex="0" onclick="alert('Добавить изображение');">
        Добавить изображение
      </div>
      <div class="course-title-section">
        <input class="course-title-input" type="text" placeholder="Название курса..." />
        <button class="enroll-btn" onclick="alert('Настройка зачисления на курс');">Настройка зачисления на курс</button>
      </div>
    </div>
    <div class="dashboard" tabindex="0" onclick="alert('Редактировать описание курса');">
      <div class="dashboard-label">Описание</div>
      <textarea class="dashboard-desc-input" placeholder="Введите описание..."></textarea>
    </div>
    <div class="button-row">
      <button class="main-btn btn-cancel" onclick="alert('Отменить');">Отменить</button>
      <button class="main-btn btn-create" onclick="alert('Создать');">Создать</button>
    </div>
  </div>
</body>
</html>
