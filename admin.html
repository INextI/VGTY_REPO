<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ВГТУ Дашборд</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #fff;
            color: #3a4250;
        }
        .header {
            width: 100%;
            background: #262F41;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
        }
        .header-left {
            display: flex;
            align-items: center;
            margin-left: 40px;
        }
        .vgtu-logo {
            width: 35px;
            height: 40px;
            margin-right: 8px;
        }
        .vgtu-text {
            color: #FFD97D;
            font-size: 18px;
            font-weight: bold;
            margin-top: 10px;
        }
        .header-right {
            display: flex;
            align-items: center;
            margin-right: 40px;
        }
        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            margin: 0 12px;
            padding: 0;
            display: flex;
            align-items: center;
        }
        .header-name {
            color: #fff;
            font-weight: bold;
            margin: 0 12px;
        }
        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #e2e2e2;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #bbb;
            font-size: 20px;
            margin-left: 7px;
        }
        .main-content {
            padding-top: 80px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 150vh;
        }
        .dashboard {
            width: 600px;
            background: #fafbfc;
            border: 1px solid #ededed;
            border-radius: 10px;
            margin-top: 20px;
            box-shadow: 0 0 0.5px rgba(60,60,60,0.03);
            padding: 16px 12px;
        }
        .dashboard-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }
        .dashboard-list li {
            border-bottom: 1px solid #ebebeb;
        }
        .dashboard-list li:last-child {
            border-bottom: none;
        }
        .dashboard-link {
            display: block;
            padding: 7px 12px;
            color: #3a4250;
            text-decoration: none;
            font-size: 16px;
            transition: background 0.12s;
        }
        .dashboard-link:hover {
            background: #f2f2f6;
        }
        @media (max-width: 700px) {
            .dashboard {
                width: 95vw;
                min-width: 0;
            }
        }
        @media (max-width: 500px) {
            .header,
            .header-left,
            .header-right {
                margin-left: 10px !important;
                margin-right: 10px !important;
            }
            .dashboard {
                width: 99vw;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
           s
            <svg class="vgtu-logo" viewBox="0 0 40 40">
                <circle cx="20" cy="20" r="18" fill="#FFD97D"/>
                <text x="10" y="28" font-size="15" font-family="Verdana" fill="#262F41">ВГТУ</text>
            </svg>
            <span class="vgtu-text">ВГТУ</span>
        </div>
        <div class="header-right">
            <button class="icon-btn" title="Поиск">
                <!-- Поиск (лупа) -->
                <svg height="19" width="19" fill="#FFD97D" viewBox="0 0 20 20">
                    <circle cx="9" cy="9" r="7" stroke="#FFD97D" stroke-width="2" fill="none"/>
                    <line x1="14" y1="14" x2="19" y2="19" stroke="#FFD97D" stroke-width="2"/>
                </svg>
            </button>
            <button class="icon-btn" title="Уведомления">
                <!-- Колокольчик -->
                <svg height="19" width="19" fill="#FFD97D" viewBox="0 0 20 20">
                    <path d="M10 18c1.1 0 2-.9 2-2H8c0 1.1.9 2 2 2zm6-4V9c0-3.07-1.64-5.64-4.5-6.32V2a1.5 1.5 0 0 0-3 0v.68C5.63 3.36 4 5.92 4 9v5l-1 1v1h16v-1l-1-1z"/>
                </svg>
            </button>
            <button class="icon-btn" title="Чат">
                <!-- Чат (bubble) -->
                <svg height="19" width="19" fill="#FFD97D" viewBox="0 0 20 20">
                    <path d="M2 16.5V4a2 2 0 012-2h12a2 2 0 012 2v10a2 2 0 01-2 2H6l-4 4.5z"/>
                </svg>
            </button>
            <span class="header-name">Иван Иванов</span>
            <div class="avatar"></div>
        </div>
    </header>
    <main class="main-content">
        <div class="dashboard">
            <ul class="dashboard-list">
                <li><a class="dashboard-link" href="#">Просмотр существующих курсов</a></li>
                <li><a class="dashboard-link" href="#">Создание курса</a></li>
                <li><a class="dashboard-link" href="#">Создание пользователя</a></li>
                <li><a class="dashboard-link" href="#">Создать уведомление</a></li>
            </ul>
        </div>
        <!-- Можно добавить больше дашбордов при необходимости -->
    </main>
</body>
</html>
