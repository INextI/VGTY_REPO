<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Лабораторный отчет</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #fafafa;
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #212529;
        }
        header {
      background: #222d3a;
      padding: 12px 0;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    .header-left {
      display: flex;
      align-items: center;
      margin-left: 30px;
    }
    .logo {
            width: 44px;
            height: 44px;
            background: #fff;
            border-radius: 50%;
            margin-right: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-right: 50px;
    }
    .icon {
      background: none;
      border: none;
      cursor: pointer;
      margin: 0 7px;
      font-size: 20px;
      color: #fff;
    }
    .user-info {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .user-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #e0e3e7;
      display: flex;
      justify-content: center;
      align-items: center;
    }
        .container {
            margin: 45px auto;
            max-width: 1000px;
            min-height: 740px;
        }
        .dashboard {
            background: #fafafa;
            margin: 0 auto;
            border: 1px solid #e6e6e6;
            border-radius: 12px;
            padding: 33px 28px 40px 28px;
            box-shadow: 0px 2px 6px 0 rgba(0,0,0,.01);
            max-width: 900px;
            cursor: pointer; /* Делает кликабельным */
            transition: box-shadow 0.16s;
        }
        .dashboard:hover {
            box-shadow: 0px 2px 16px 0 rgba(0,0,0,.08);
        }
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }
        .dashboard select {
            font-size: 1em;
            padding: 6px 18px 6px 8px;
            border-radius: 6px;
            border: 1px solid #cccccc;
            background: #fff;
        }
        .dashboard .deadline {
            font-size: 1em;
        }
        .close-btn {
            display: inline-block;
            margin: 12px 0;
            background: #232d43;
            color: #fff;
            border-radius: 10px;
            padding: 8px 30px;
            border: none;
            font-size: 1em;
            font-weight: 500;
            cursor: pointer;
        }
        .table-container {
            background: #fff;
            border-radius: 13px;
            overflow: hidden;
            margin-bottom: 18px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
        }
        table th, table td {
            padding: 6px 12px;
            font-size: 0.98em;
        }
        table th {
            font-weight: 500;
            color: #232d43;
        }
        table tr:nth-child(even) {
            background: #f4f4f4;
        }
        table tr {
            border-bottom: 1px solid #eeeeee;
        }
        .student-select, .student-files {
            padding: 8px 0 2px 0;
            font-size: 1em;
            margin-bottom: 8px;
        }
        .student-files a {
            margin-right: 10px;
            color: #1260c3;
            font-size: 1em;
            text-decoration: none;
            cursor: pointer;
        }
        .student-files a:hover {
            text-decoration: underline;
        }
        .comment-box {
            width: 100%;
            min-height: 85px;
            border-radius: 15px;
            padding: 12px;
            border: 1px solid #e0e0e0;
            font-size: 1em;
            margin-bottom: 17px;
            resize: vertical;
            font-family: inherit;
        }
        .rate-btn {
            background: #18661b;
            color: #fff;
            padding: 7px 31px;
            font-size: 1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .rate-btn:hover {
            background: #135313;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <div class="logo">
                <!-- Логотип или иконка -->
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/dd/Vstu_logo.svg/640px-Vstu_logo.svg.png" alt="logo" width="24" height="34">
            </div>
          </div>
          <div class="header-right">
            <button class="icon" title="Поиск"><i class="fas fa-search"></i></button>
            <button class="icon" title="Уведомления"><i class="fas fa-bell"></i></button>
            <button class="icon" title="Чат"><i class="fas fa-comments"></i></button>
            <div class="user-info">
              <span>Иван Иванов</span>
              <div class="user-avatar"><i class="fas fa-user"></i></div>
            </div>
          </div>
      </header>
    <div class="container">
        <div class="dashboard" onclick="alert('Панель кликабельная!')">
            <div class="dashboard-header">
                <select>
                    <option>lab1</option>
                    <option>lab2</option>
                </select>
                <span class="deadline">
                    Конец сдачи: <b>12.12.1212 17:00</b>
                </span>
            </div>
            <button class="close-btn" onclick="alert('Отчет закрыт!');event.stopPropagation();">Закрыть отчет</button>
            <div class="table-container" onclick="event.stopPropagation();alert('Дашборд кликабельный!')">
                <table>
                    <tr>
                        <th>Name Surname</th>
                        <th>Группа</th>
                        <th>Статус</th>
                        <th>Комментарий</th>
                    </tr>
                    <tr>
                        <td>Name Surname</td>
                        <td></td>
                        <td>Не оценено</td>
                        <td></td>
                    </tr>
                    <tr>
                        <td>Name Surname</td>
                        <td></td>
                        <td>Оценено</td>
                        <td>Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed...</td>
                    </tr>
                    <tr>
                        <td>Name Surname</td>
                        <td></td>
                        <td>Работа не выложена</td>
                        <td></td>
                    </tr>
                </table>
            </div>
            <div class="student-select">
                <select>
                    <option>Name Surname</option>
                    <option>Name Surname2</option>
                </select>
            </div>
            <div class="student-files">
                <a href="#">File1</a>
                <a href="#">File1</a>
                <a href="#">File1</a>
            </div>
            <textarea class="comment-box" placeholder="Написать комментарий..."></textarea>
            <button class="rate-btn" onclick="alert('Оценка отправлена!');event.stopPropagation();">Оценить</button>
        </div>
    </div>
</body>
</html>
